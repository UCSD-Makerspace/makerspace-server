        wg_public_key: "{{ _kiosk_keys.results[1].content | b64decode | trim }}"


- name: Configure WireGuard on server
  hosts: control_plane
  become: true

  handlers:
    - name: Restart WireGuard
      systemd:
        name: wg-quick@wg0
        state: restarted

  tasks:
    - name: Write server wg0.conf
      template:
        src: templates/wg0-server.conf.j2
        dest: /etc/wireguard/wg0.conf
        mode: "0600"
      notify: Restart WireGuard

    - name: Enable and start WireGuard
      systemd:
        name: wg-quick@wg0
        enabled: true
        state: started

- name: Configure WireGuard on kiosks
  hosts: kiosks
  become: true

  handlers:
    - name: Restart WireGuard
      systemd:
        name: wg-quick@wg0
        state: restarted

  vars:
    server_public_key: "{{ hostvars[groups['control_plane'][0]]['wg_public_key'] }}"
    server_endpoint: "{{ hostvars[groups['control_plane'][0]]['ansible_host'] }}"
    server_wireguard_ip: "{{ hostvars[groups['control_plane'][0]]['wireguard_ip'] }}"

  tasks:
    - name: Write kiosk wg0.conf
      template:
        src: templates/wg0-kiosk.conf.j2
        dest: /etc/wireguard/wg0.conf
        mode: "0600"
      notify: Restart WireGuard

    - name: Enable and start WireGuard
      systemd:
        name: wg-quick@wg0
        enabled: true
        state: started


- name: Print server WireGuard public key
  hosts: control_plane

  tasks:
    - name: Server public key
      debug:
        msg: "Server WireGuard public key: {{ hostvars[inventory_hostname]['wg_public_key'] }}"
