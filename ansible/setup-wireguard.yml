- name: Install and key WireGuard on server
  hosts: control_plane
  become: true

  tasks:
    - name: Install WireGuard
      apt:
        name: wireguard
        state: present
        update_cache: true

    - name: Ensure /etc/wireguard exists
      file:
        path: /etc/wireguard
        state: directory
        mode: "0700"

    - name: Generate WireGuard keys
      shell: wg genkey | tee /etc/wireguard/privatekey | wg pubkey > /etc/wireguard/publickey
      args:
        creates: /etc/wireguard/privatekey

    - name: Lock down private key permissions
      file:
        path: /etc/wireguard/privatekey
        mode: "0600"

    - name: Read server keys
      slurp:
        src: "{{ item }}"
      loop:
        - /etc/wireguard/privatekey
        - /etc/wireguard/publickey
      register: _server_keys

    - name: Store server key facts
      set_fact:
        wg_private_key: "{{ _server_keys.results[0].content | b64decode | trim }}"
        wg_public_key: "{{ _server_keys.results[1].content | b64decode | trim }}"


- name: Install and key WireGuard on kiosks
  hosts: kiosks
  become: true

  tasks:
    - name: Install WireGuard
      apt:
        name: wireguard
        state: present
        update_cache: true

    - name: Ensure /etc/wireguard exists
      file:
        path: /etc/wireguard
        state: directory
        mode: "0700"

    - name: Generate WireGuard keys
      shell: wg genkey | tee /etc/wireguard/privatekey | wg pubkey > /etc/wireguard/publickey
      args:
