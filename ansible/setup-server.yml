- name: Harden SSH on server
  hosts: control_plane
  become: true

  handlers:
    - name: Restart SSH
      systemd:
        name: ssh
        state: restarted

  tasks:
    - name: Add authorized SSH keys
      authorized_key:
        user: "{{ ansible_user }}"
        key: "{{ lookup('file', playbook_dir + '/files/ssh-keys.conf') }}"
        exclusive: false

    - name: Install dependencies
      apt:
        name: htop
        state: present
        update_cache: true

    - name: Disable SSH password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart SSH


- name: Configure system limits for K3s
  hosts: k3s_cluster
  become: true

  tasks:
    - name: Set inotify limits
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-k3s.conf
        reload: true
      loop:
        - { key: "fs.inotify.max_user_instances", value: "8192" }
        - { key: "fs.inotify.max_user_watches", value: "524288" }


- name: Setup K3s control plane
  hosts: control_plane
  become: true

  handlers:
    - name: Restart K3s
      systemd:
        name: k3s
        state: restarted
      ignore_errors: true

  tasks:
    - name: Ensure /etc/rancher/k3s exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Write K3s config (TLS SAN for WireGuard IP)
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: "0644"
        content: |
          tls-san:
            - {{ wireguard_ip }}
      register: k3s_config

    - name: Remove stale API server certs for regeneration
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.crt
        - /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.key
      when: k3s_config.changed
      notify: Restart K3s

    - name: Install K3s control plane
      shell: curl -sfL https://get.k3s.io | sh -s
      args:
        creates: /etc/systemd/system/k3s.service


- name: Setup K3s worker nodes
  hosts: workers
  become: true

  tasks:
    - name: Read K3s token from control plane
      slurp:
        path: /var/lib/rancher/k3s/server/node-token
      delegate_to: "{{ groups['control_plane'][0] }}"
      register: k3s_token_file

    - name: Install K3s agent
      shell: |
        export K3S_URL="https://{{ hostvars[groups['control_plane'][0]]['ansible_host'] }}:6443"
        export K3S_TOKEN="{{ k3s_token_file.content | b64decode | trim }}"
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /etc/systemd/system/k3s-agent.service
      no_log: true


- name: Verify K3s cluster
  hosts: control_plane
  become: true

  tasks:
    - name: Get all nodes
      command: kubectl get nodes
      register: nodes
      changed_when: false

    - name: Display cluster nodes
      debug:
        msg: "{{ nodes.stdout_lines }}"

    - name: Verify expected node count
      assert:
        that:
          - (nodes.stdout_lines | length - 1) == (groups['control_plane'] | length + groups['workers'] | default([]) | length)
        fail_msg: "Expected {{ groups['control_plane'] | length + groups['workers'] | default([]) | length }} nodes, but found {{ nodes.stdout_lines | length - 1 }}"
        success_msg: "All {{ groups['control_plane'] | length + groups['workers'] | default([]) | length }} nodes joined successfully"
