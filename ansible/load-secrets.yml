- name: Load secrets into Kubernetes
  hosts: control_plane
  become: true

  vars_files:
    - "{{ playbook_dir }}/../secrets.yml"

  tasks:
    - name: Ensure ciapi namespace exists
      shell: kubectl create namespace ciapi --dry-run=client -o yaml | kubectl apply -f -
      register: namespace_result
      changed_when: "'created' in namespace_result.stdout"

    - name: Upload Google credentials to server
      copy:
        src: "{{ google_credentials_path }}"
        dest: /tmp/google-creds.json
        mode: "0600"
      changed_when: false

    - name: Apply env-vars secret
      shell: |
        kubectl create secret generic env-vars \
          --namespace ciapi \
          --from-literal=UCSD_CLIENT_ID="{{ ucsd_client_id }}" \
          --from-literal=UCSD_CLIENT_SECRET="{{ ucsd_client_secret }}" \
          --from-literal=FABMAN_API_TOKEN="{{ fabman_api_token }}" \
          --from-literal=USER_SHEET_ID="{{ user_sheet_id }}" \
          --from-literal=WAIVER_SHEET_ID="{{ waiver_sheet_id }}" \
          --from-literal=ACTIVITY_SHEET_ID="{{ activity_sheet_id }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      register: env_vars_result
      changed_when: "'configured' in env_vars_result.stdout or 'created' in env_vars_result.stdout"
      no_log: true

    - name: Apply google-credentials secret
      shell: |
        kubectl create secret generic google-credentials \
          --namespace ciapi \
          --from-file=creds.json=/tmp/google-creds.json \
          --dry-run=client -o yaml | kubectl apply -f -
      register: google_creds_result
      changed_when: "'configured' in google_creds_result.stdout or 'created' in google_creds_result.stdout"
      no_log: true

    - name: Remove tmp credentials file from server
      file:
        path: /tmp/google-creds.json
        state: absent
      changed_when: false
